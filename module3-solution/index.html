<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Food, LLC</title>

  <!-- Bootstrap 3.3.7 CSS -->
  <link
    rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
    integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
    crossorigin="anonymous"
  >

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-default">
    <div class="container-fluid">

      <!-- Brand + Toggle (toggle only visible on xs) -->
      <div class="navbar-header">

        <!-- Hamburger button: ONLY shown on mobile (xs) -->
        <button
          type="button"
          class="navbar-toggle collapsed visible-xs"
          data-toggle="collapse"
          data-target="#mobile-menu"
          aria-expanded="false"
        >
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>

        <!-- Brand: always visible -->
        <a class="navbar-brand" href="#">Food, LLC</a>
      </div><!-- /.navbar-header -->

      <!-- Collapsible menu: ONLY renders/shows on xs -->
      <div class="collapse navbar-collapse visible-xs-block" id="mobile-menu">
        <ul class="nav navbar-nav">
          <li><a href="#chicken">Chicken</a></li>
          <li><a href="#beef">Beef</a></li>
          <li><a href="#sushi">Sushi</a></li>
        </ul>
      </div><!-- /.navbar-collapse -->

    </div><!-- /.container-fluid -->
  </nav><!-- /nav -->


  <!-- ===================== PAGE HEADING ===================== -->
  <div class="container">
    <h2 class="text-center page-heading">Our Menu</h2>
  </div>


  <!-- ===================== MAIN CONTENT SECTION ===================== -->
  <div class="container-fluid">
    <div class="row">
      <div class="col-xs-12 main-section">
        <p>Welcome to Food, LLC — where every dish tells a story.</p>
      </div>
    </div>
  </div>


  <!-- jQuery + Bootstrap JS -->
  <script
    src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js">
  </script>
  <script
    src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"
    integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
    crossorigin="anonymous">
  </script>

</body>
</html>
